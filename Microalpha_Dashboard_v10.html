<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0e1a"><div style="text-align:center;color:#94a3b8"><div style="width:40px;height:40px;border:3px solid #1e293b;border-top:3px solid #3b82f6;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px"></div>Se încarcă...</div></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style></div>
<script type="text/babel">
if(typeof React==='undefined'||typeof Recharts==='undefined'){document.getElementById('root').innerHTML='<p style="color:#ef4444;padding:40px">Dependentele nu s-au incarcat. Verifica internetul.</p>';throw new Error('deps')}
const{useState,useEffect,useCallback,useMemo,useRef}=React;
const{LineChart,Line,AreaChart,Area,BarChart,Bar,PieChart,Pie,Cell,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Legend,ComposedChart}=Recharts;
const MRO=['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];
const MS=['Ian','Feb','Mar','Apr','Mai','Iun','Iul','Aug','Sep','Oct','Nov','Dec'];
const C={blue:'#3b82f6',green:'#10b981',red:'#ef4444',yellow:'#f59e0b',purple:'#8b5cf6',cyan:'#06b6d4'};
const PC=['#3b82f6','#8b5cf6','#06b6d4','#10b981','#f59e0b','#ec4899'];
const fmt=(n,d=0)=>{if(n==null||isNaN(n))return'0';const a=Math.abs(n);if(a>=1e6)return(n/1e6).toFixed(1)+'M';if(a>=1e3)return(n/1e3).toFixed(d>0?d:a>=1e4?0:1)+'K';return n.toFixed(d).replace(/\B(?=(\d{3})+(?!\d))/g,',')};
const ff=(n)=>{if(n==null||isNaN(n))return'0';return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,',')};
const pct=(v,t)=>t===0?'0.0':((v/t)*100).toFixed(1);
const gw=(c,p)=>p===0?(c>0?'100.0':'0.0'):(((c-p)/p)*100).toFixed(1);
const AUTH_USER='admin';
const AUTH_PASS='MicroAlpha2026!';
const DEFAULT_DATA={months:[],bankStatement:[],renewals:{total:0,nextMonthDue:0,byStatus:{Pending:0,Renewed:0,Churned:0},upcomingMonth:{}},sources:[{id:'gs',name:'Google Sheets (Incasari)',type:'google-sheets',active:true,deletable:false}]};
function computeRenewals(data){
  if(!data.months||data.months.length===0)return{total:0,nextMonthDue:0,byStatus:{Pending:0,Renewed:0,Churned:0},clients:[]};
  const clients={};
  data.months.forEach(m=>{
    m.transactions.forEach(t=>{
      if(t.type==='annual'||t.type==='monthly'){
        if(!clients[t.client])clients[t.client]={name:t.client,type:t.type,amount:0,lastDate:null,months:[]};
        clients[t.client].amount+=t.amount;
        clients[t.client].lastDate=t.date;
        clients[t.client].months.push(m.name);
      }
    });
  });
  const now=new Date(),cList=Object.values(clients);
  let due=0;
  cList.forEach(c=>{
    if(!c.lastDate)return;
    const ld=new Date(c.lastDate);
    const validity=c.type==='annual'?365:30;
    const expiry=new Date(ld.getTime()+validity*86400000);
    const daysLeft=Math.floor((expiry-now)/86400000);
    c.daysLeft=daysLeft;
    c.status=daysLeft<0?'Churned':daysLeft<=30?'Pending':'Renewed';
    if(daysLeft>=0&&daysLeft<=30)due++;
  });
  return{total:cList.length,nextMonthDue:due,byStatus:{Pending:cList.filter(c=>c.status==='Pending').length,Renewed:cList.filter(c=>c.status==='Renewed').length,Churned:cList.filter(c=>c.status==='Churned').length},clients:cList};
}
function integrateExpenses(data){
  if(!data.months||data.months.length===0||!data.bankStatement||data.bankStatement.length===0)return data;
  const updated={...data,months:data.months.map(m=>{
    const mIdx=m.month;const expenses={total:0,breakdown:{}};
    data.bankStatement.filter(t=>!t.excluded&&t.amount<0).forEach(t=>{
      const td=new Date(t.date);
      if(td.getMonth()+1===mIdx){
        const amt=Math.abs(t.amount);
        const cat=t.expenseCategory||t.category||'Necategorizat';
        expenses.total+=amt;expenses.breakdown[cat]=(expenses.breakdown[cat]||0)+amt;
      }
    });
    let capitalIn=0;
    data.bankStatement.filter(t=>!t.excluded&&t.amount>0&&(t.incomeType==='Capital Social'||t.category==='Capital Social')).forEach(t=>{
      const td=new Date(t.date);
      if(td.getMonth()+1===mIdx)capitalIn+=t.amount;
    });
    return{...m,expenses,capitalInflows:capitalIn,cashInflows:m.totalIncasari+capitalIn,cashBalance:m.totalIncasari+capitalIn-expenses.total};
  })};
  let runBal=0;
  updated.months.forEach(m=>{runBal+=m.totalIncasari+m.capitalInflows-m.expenses.total;m.cashBalance=runBal});
  return updated;
}
async function fetchAppsScript(scriptUrl,token){
  const sep=scriptUrl.includes('?')?'&':'?';
  const url=`${scriptUrl}${sep}token=${encodeURIComponent(token)}`;
  const res=await fetch(url,{redirect:'follow'});
  if(!res.ok)throw new Error(`HTTP ${res.status}`);
  const json=await res.json();
  if(json.error)throw new Error(json.message||json.error);
  const months=json.months.map(m=>({
    name:m.name,month:m.monthIndex+1,year:new Date().getFullYear(),
    totalIncasari:m.totalIncasari,
    transactions:m.transactions.map(t=>({type:t.type,client:(t.client||'').replace(/\s+/g,' ').trim(),contract:t.contract,amount:t.amount,service:t.service,manager:t.manager,date:t.date})),
    newSubscribers:m.newSubscribers,annualSubs:m.annualSubs,monthlySubs:m.monthlySubs,
    mrr:m.mrr,
    expenses:{total:0,breakdown:{}},cashInflows:m.totalIncasari,capitalInflows:0,cashBalance:0
  })).filter(m=>m.totalIncasari>0||m.transactions.length>0);
  return{months,renewals:DEFAULT_DATA.renewals,bankStatement:DEFAULT_DATA.bankStatement,meta:json.meta};
}
function computeClientStatus(data){
  const clients={};
  data.months.forEach(m=>{
    m.transactions.forEach(t=>{
      if(!clients[t.client])clients[t.client]={name:t.client,net:0,type:null,firstPositive:null,lastPositive:null,transactions:[]};
      clients[t.client].transactions.push({...t,monthNum:m.month});
      if(t.amount>0){clients[t.client].net+=t.amount;if(!clients[t.client].firstPositive)clients[t.client].firstPositive=t.date;clients[t.client].lastPositive=t.date;}
      else clients[t.client].net+=t.amount;
      if(t.service.includes('Anual'))clients[t.client].type='annual';
      else if(t.service.includes('Lunar'))clients[t.client].type='monthly';
    });
  });
  const now=new Date();
  return Object.values(clients).map(c=>{
    c.net=Math.max(0,c.net);
    const daysSinceLastPos=c.lastPositive?Math.floor((now-new Date(c.lastPositive))/86400000):Infinity;
    const validityDays=c.type==='annual'?365:30;
    if(c.net>0&&daysSinceLastPos<=validityDays)c.status='active';
    else if(c.net===0&&c.transactions.filter(t=>t.amount>0).length===c.transactions.filter(t=>t.amount<0).length)c.status='churn_explicit';
    else if(c.net>0&&daysSinceLastPos>validityDays)c.status='churn_passive';
    else c.status='active';
    return c;
  });
}
function computeAudit(data){
  if(!data.months||data.months.length===0)return {};
  const A={};const allTx=data.months.flatMap(m=>m.transactions.map(t=>({...t,monthName:m.name,monthNum:m.month})));
  const tRev=data.months.reduce((s,m)=>s+m.totalIncasari,0),tSub=data.months.reduce((s,m)=>s+m.newSubscribers,0);
  const latest=data.months[data.months.length-1],prev=data.months.length>1?data.months[data.months.length-2]:null;
  const tExp=data.months.reduce((s,m)=>s+m.expenses.total,0),eM=data.months.filter(m=>m.expenses.total>0).length||1;
  const rBM=data.months.map(m=>({month:m.name,declared:m.totalIncasari,computed:m.transactions.reduce((s,t)=>s+t.amount,0),annualRev:m.transactions.filter(t=>t.type==='annual').reduce((s,t)=>s+t.amount,0),monthlyRev:m.transactions.filter(t=>t.type==='monthly').reduce((s,t)=>s+t.amount,0),otherRev:m.transactions.filter(t=>t.type==='other').reduce((s,t)=>s+t.amount,0)}));
  const cT=rBM.reduce((s,r)=>s+r.computed,0);
  A.totalRevenue={id:'totalRevenue',label:'Total Revenue',value:tRev,computedValue:cT,match:Math.abs(tRev-cT)<1,formula:'SUM(incasari_luna)',formulaDetail:rBM.map(r=>`${r.month}: ${ff(r.declared)} RON`).join(' + ')+` = ${ff(tRev)} RON`,breakdown:rBM,transactions:allTx,source:'Incasari → col E'};
  const mD=data.months.map(m=>{const aM=m.transactions.filter(t=>t.type==='annual').reduce((s,t)=>s+t.amount/12,0),mM=m.transactions.filter(t=>t.type==='monthly').reduce((s,t)=>s+t.amount,0);return{month:m.name,declared:m.mrr,computed:Math.round((aM+mM)*100)/100,annualMRR:Math.round(aM*100)/100,monthlyMRR:mM,annualCount:m.annualSubs,monthlyCount:m.monthlySubs}});
  const lm=mD[mD.length-1];
  A.mrr={id:'mrr',label:'MRR',value:latest.mrr,computedValue:lm.computed,match:Math.abs(latest.mrr-lm.computed)<2,formula:'SUM(annual/12) + SUM(monthly)',formulaDetail:`Anuali: ${lm.annualCount} x (amt/12) = ${ff(Math.round(lm.annualMRR))}\nLunari: ${lm.monthlyCount} = ${ff(lm.monthlyMRR)}\nTotal: ${ff(Math.round(lm.computed))}`,breakdown:mD,transactions:allTx.filter(t=>t.monthNum===latest.month),source:'Incasari → col J'};
  const arr=latest.mrr*12;
  A.arr={id:'arr',label:'ARR',value:arr,computedValue:lm.computed*12,match:true,formula:'MRR x 12',formulaDetail:`${ff(Math.round(latest.mrr))} x 12 = ${ff(Math.round(arr))}`,breakdown:[{label:'MRR',value:latest.mrr},{label:'x12',value:12},{label:'ARR',value:arr}],transactions:[],source:'Derivat din MRR'};
  A.subscribers={id:'subscribers',label:'Total Abonati',value:tSub,computedValue:allTx.filter(t=>t.type==='annual'||t.type==='monthly').length,match:tSub===allTx.filter(t=>t.type==='annual'||t.type==='monthly').length,formula:'COUNT(tranzactii)',formulaDetail:data.months.map(m=>`${m.name}: ${m.newSubscribers}`).join(', '),breakdown:data.months.map(m=>({month:m.name,annual:m.annualSubs,monthly:m.monthlySubs,total:m.newSubscribers})),transactions:allTx.filter(t=>t.type!=='other'),source:'Incasari count'};
  const arpu=tSub>0?tRev/tSub:0,cArpu=tSub>0?cT/tSub:0;
  A.arpu={id:'arpu',label:'ARPU',value:arpu,computedValue:cArpu,match:Math.abs(arpu-cArpu)<1,formula:'Revenue / Subscribers',formulaDetail:`${ff(tRev)} / ${tSub} = ${ff(Math.round(arpu))}`,breakdown:[{label:'Revenue',value:tRev},{label:'Subs',value:tSub},{label:'ARPU',value:Math.round(arpu)}],transactions:[],source:'Derivat'};
  A.cashBalance={id:'cashBalance',label:'Cash Balance',value:latest.cashBalance,computedValue:latest.cashBalance,match:true,formula:'Sold + Intrari - Iesiri',formulaDetail:data.months.map(m=>`${m.name}: ${ff(Math.round(m.cashBalance))}`).join('\n'),breakdown:data.months.map(m=>({month:m.name,inflows:m.cashInflows,capital:m.capitalInflows,outflows:m.expenses.total,balance:m.cashBalance})),transactions:data.bankStatement,source:'Extras Revolut'};

function buildSubscriberList(data){
  if(!data.months||data.months.length===0)return[];
  const subs={};
  data.months.forEach(m=>{
    m.transactions.forEach(t=>{
      if(t.type!=='annual'&&t.type!=='monthly')return;
      const key=t.client;
      if(!subs[key]){
        subs[key]={client:t.client,payments:[]};
      }
      subs[key].payments.push({date:t.date,amount:t.amount,service:t.service||t.contract||'-',month:m.name,monthNum:m.month,year:m.year||new Date().getFullYear(),type:t.type});
    });
  });
  return Object.values(subs).map(s=>{
    s.payments.sort((a,b)=>new Date(a.date)-new Date(b.date));
    // Plati pozitive si negative separate
    const posPayments=s.payments.filter(p=>p.amount>0);
    const negPayments=s.payments.filter(p=>p.amount<0);
    const totalNet=s.payments.reduce((sum,p)=>sum+p.amount,0);
    const negSum=negPayments.reduce((sum,p)=>sum+p.amount,0);
    // Prima si ultima plata pozitiva — definesc abonamentul real
    const firstPos=posPayments.length>0?posPayments[0]:s.payments[0];
    const lastPos=posPayments.length>0?posPayments[posPayments.length-1]:s.payments[s.payments.length-1];
    // Tipul curent = ultima plata pozitiva (source of truth)
    const currentType=lastPos.type||firstPos.type||'monthly';
    const validity=currentType==='annual'?365:30;
    const expiry=new Date(new Date(lastPos.date).getTime()+validity*86400000);
    const now=new Date();
    const daysLeft=Math.floor((expiry-now)/86400000);
    const isExpired=daysLeft<0;
    // Renewed = are mai mult de o plata pozitiva
    const renewed=posPayments.length>1;
    const renewPay=renewed?lastPos:null;
    const renewAmount=renewPay?renewPay.amount:0;
    // Upgrade = monthly→annual, Downgrade = annual→monthly (schimbare tip abonament)
    const firstType=firstPos.type||'monthly';
    const lastType=lastPos.type||'monthly';
    const isUpgrade=renewed&&firstType==='monthly'&&lastType==='annual';
    const isDowngrade=renewed&&firstType==='annual'&&lastType==='monthly';
    const upgradeAmt=isUpgrade?lastPos.amount:0;
    const downgradeAmt=isDowngrade?lastPos.amount:0;
    // Churn: DOAR daca suma totala neta <= 0 SAU contract expirat
    const isChurn=totalNet<=0||(isExpired&&posPayments.length>0);
    const churnAmt=isChurn?(totalNet<=0?totalNet:-lastPos.amount):0;
    // Status: bazat pe suma neta, expirare si schimbare tip
    let status;
    if(totalNet<=0)status='Churn';
    else if(isExpired)status='Churn';
    else if(isUpgrade)status='Upgrade';
    else if(isDowngrade)status='Downgrade';
    else if(daysLeft<=7)status='Pending';
    else status='Active';
    const renewMonth=MRO[expiry.getMonth()]+' '+expiry.getFullYear();
    return{
      client:s.client,produs:firstPos.service||'-',firstDate:firstPos.date,firstAmount:firstPos.amount,
      currentType,
      expiry:expiry.toISOString().split('T')[0],
      renewed:renewed?'DA':'NU',
      renewDate:renewPay?renewPay.date:'-',
      renewProduct:renewPay?renewPay.service:'-',
      renewAmount,upgradeAmt,downgradeAmt,
      churnAmt:status==='Churn'?negSum||(-lastPos.amount):0,showChurn:status==='Churn',
      status,renewMonth,totalNet,
      payments:s.payments
    };
  }).sort((a,b)=>a.client.localeCompare(b.client));
}

const INCOME_TYPES=['Procesator Plăți','Capital Social','Transfer Direct Client','Altele'];
const EXPENSE_CATS=['IT','Legal','Operational','Subscriptions','Marketing','HR','Birouri','Advertising','Salarii','Altele'];
const AUTO_RULES=[
  {p:/netopia|payment processor|procesator/i,inc:'Procesator Plăți',exp:null},
  {p:/capital|aport|majorare|topup/i,inc:'Capital Social',exp:null},
  {p:/microalpha|software|hosting|server/i,inc:null,exp:'IT'},
  {p:/notar|avocat|juridic/i,inc:null,exp:'Legal'},
  {p:/revolut|comision|fee|tarif|abonament revolut/i,inc:null,exp:'Subscriptions'},
  {p:/salar|payroll/i,inc:null,exp:'Salarii'},
  {p:/chirie|birou|office/i,inc:null,exp:'Birouri'},
  {p:/marketing|ads|facebook|google ads/i,inc:null,exp:'Marketing'},
  {p:/împrumut|imprumut/i,inc:'Altele',exp:null}
];
function autoCat(desc,amt){for(const r of AUTO_RULES)if(r.p.test(desc))return amt>=0?{incomeType:r.inc||'Altele',expenseCategory:null}:{incomeType:null,expenseCategory:r.exp||'Altele'};return amt>=0?{incomeType:'Altele',expenseCategory:null}:{incomeType:null,expenseCategory:'Altele'}}
function parseCSVLine(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c.trim());c=''}else c+=ch}r.push(c.trim());return r}
function parseRevolutCSV(content,sourceId){
  const lines=content.trim().split('\n');if(lines.length<2)return[];
  const h=parseCSVLine(lines[0]);
  const di=h.findIndex(x=>x.includes('Date completed')),dsi=h.findIndex(x=>x==='Description'),ti=h.findIndex(x=>x==='Type'),ai=h.findIndex(x=>x==='Amount');
  if(di<0||dsi<0||ti<0||ai<0)throw new Error('CSV invalid — lipsa coloane Date completed/Description/Type/Amount');
  const tx=[];
  for(let i=1;i<lines.length;i++){
    const p=parseCSVLine(lines[i]);if(p.length<=Math.max(di,dsi,ti,ai))continue;
    const d=p[di],desc=p[dsi],t=p[ti],a=parseFloat(p[ai].replace(',','.'));
    if(!d||!desc||isNaN(a))continue;
    const cat=autoCat(desc,a);
    tx.push({id:`csv_${sourceId}_${i}`,date:d.split(' ')[0],description:desc,type:t,amount:a,...cat,sourceId});
  }
  return tx;
}

    return d;
  },[data]);
  const audits=useMemo(()=>computeAudit(enriched),[enriched]);
  const openA=(k)=>{if(audits[k])setAuditModal(audits[k])};
  useEffect(()=>{
    try{localStorage.setItem('microalpha_v10',JSON.stringify({auth,tab,data,config,cs,ar,showExcl}))}catch(e){}
  },[auth,tab,data,config,cs,ar,showExcl]);
  const connect=useCallback(async()=>{
    if(!config.scriptUrl||!config.token){alert('Completeaza URL-ul si token-ul');return}
    setCs('loading');
    try{const nd=await fetchAppsScript(config.scriptUrl,config.token);if(nd.months.length>0){setData(p=>({...p,months:nd.months}));setCs('connected');setLr(new Date())}else setCs('error')}
    catch(e){console.error(e);setCs('error')}
  },[config]);
  useEffect(()=>{if(!ar||cs!=='connected')return;const iv=setInterval(connect,5*60*1000);return()=>clearInterval(iv)},[ar,cs,connect]);
  if(!auth)return <LoginScreen onLogin={setAuth}/>;
  const tabs=[{id:'overview',label:'Overview'},{id:'revenue',label:'Revenue'},{id:'subscribers',label:'Subscribers'},{id:'renewals',label:'Renewals'},{id:'audit',label:'Audit',isAudit:true},{id:'pnl',label:'P&L'},{id:'cashflow',label:'Cashflow'},{id:'upload',label:'Upload (Data)'}];
  return(<div style={{minHeight:'100vh',padding:'0 24px 40px'}}>
    {auditModal&&<AuditModal audit={auditModal} onClose={()=>setAuditModal(null)}/>}
    <header style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'18px 0',borderBottom:'1px solid var(--brd)',marginBottom:22}}>
      <div style={{display:'flex',alignItems:'center',gap:14}}>
        <svg width="26" height="26" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="url(#lg3)"/><defs><linearGradient id="lg3" x1="0" y1="0" x2="32" y2="32"><stop stopColor="#3b82f6"/><stop offset="1" stopColor="#8b5cf6"/></linearGradient></defs><path d="M8 22V14l4-4 4 4v8M20 22V10l4-4v16" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        <div><div style={{fontSize:'1.2rem',fontWeight:800}}>Microalpha<span style={{color:C.blue}}> AI</span></div><div style={{fontSize:'.72rem',color:'var(--t3)'}}>Dashboard v10 — Securizat</div></div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{fontSize:'.72rem',color:'var(--t3)',textAlign:'right'}}><div>Actualizat</div><div style={{color:'var(--t2)',fontWeight:500}}>{lr.toLocaleString('ro-RO')}</div></div>
        {cs==='connected'&&<button className="btn-o" onClick={()=>setAr(!ar)} style={{fontSize:'.72rem',borderColor:ar?C.green:'var(--brd)',color:ar?C.green:'var(--t3)'}}>{ar?'⟳ Auto ON':'Auto OFF'}</button>}
        <button className="btn-o" onClick={connect} style={{fontSize:'.72rem'}}>⟳ Refresh</button>
        <Settings config={config} setConfig={setConfig} onConnect={connect} status={cs}/>
        <button className="btn-red" onClick={()=>setAuth(false)} title="Deconectare">&#x2715; Logout</button>
      </div>
    </header>
    <nav style={{display:'flex',gap:0,borderBottom:'1px solid var(--brd)',marginBottom:22}}>
      {tabs.map(t=><button key={t.id} className={`tab-btn ${tab===t.id?'active':''} ${t.isAudit?'audit-tab':''}`} onClick={()=>setTab(t.id)}>{t.isAudit&&'⚑ '}{t.label}</button>)}
    </nav>
    {tab==='overview'&&<OverviewTab data={enriched} oA={openA}/>}
    {tab==='revenue'&&<RevenueTab data={enriched} oA={openA}/>}
    {tab==='subscribers'&&<SubscribersTab data={enriched} oA={openA}/>}
    {tab==='renewals'&&<RenewalsTab data={enriched} oA={openA} audits={audits}/>}
    {tab==='audit'&&<AuditTab audits={audits} openA={openA}/>}
    {tab==='pnl'&&<PLTab data={enriched} oA={openA}/>}
    {tab==='cashflow'&&<CashflowTab data={enriched} oA={openA}/>}
    {tab==='upload'&&<UploadTab data={data} onUpdateBankTx={(tx)=>setData(prev=>({...prev,bankTx:tx,bankStatement:tx}))} onUpdateSources={(src)=>setData(prev=>({...prev,sources:src}))} showExcluded={showExcl} setShowExcluded={setShowExcl}/>}
    <footer style={{marginTop:36,padding:'14px 0',borderTop:'1px solid var(--brd)',display:'flex',justifyContent:'space-between'}}>
      <div style={{fontSize:'.68rem',color:'var(--t3)'}}>Microalpha v10 — Apps Script Proxy (sheet privat)</div>
      <div style={{fontSize:'.68rem',color:'var(--t3)'}}>{cs==='connected'?<span style={{color:C.green}}>&#x25CF; Live securizat</span>:<span>&#x25CB; Date locale</span>}</div>
    </footer>
  </div>);
}
ReactDOM.render(<ErrorBoundary><App/></ErrorBoundary>,document.getElementById('root'));
</script>
</body>
</html>
